services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: sudoku_php
    volumes:
      - ./app:/var/www/html
      - vendor_data:/var/www/html/vendor
    ports:
      - "8000:80"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: sudoku_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./app/sudoku_master.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  websocket:
    build:
      context: .
      dockerfile: docker/websocket/Dockerfile
    container_name: sudoku_websocket
    ports:
      - "8080:8080"
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin
    container_name: sudoku_pma
    environment:
      PMA_HOST: mysql
    ports:
      - "8081:80"
    depends_on:
      - mysql

volumes:
  db_data:
  vendor_data:
